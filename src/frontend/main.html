<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GalBundler</title>
  <style>
    :root {
      --md-primary: #6750A4;
      --md-on-primary: #FFFFFF;
      --md-primary-container: #EADDFF;
      --md-on-primary-container: #21005D;
      --md-secondary: #625B71;
      --md-on-secondary: #FFFFFF;
      --md-secondary-container: #E8DEF8;
      --md-on-secondary-container: #1D192B;
      --md-surface: #FFFBFE;
      --md-on-surface: #1C1B1F;
      --md-surface-variant: #E7E0EC;
      --md-on-surface-variant: #49454F;
      --md-outline: #79747E;
      --md-surface-container: #F3EDF7;
      --md-surface-container-high: #ECE6F0;
      --md-elevation-1: 0 1px 2px rgba(0,0,0,0.3), 0 1px 3px 1px rgba(0,0,0,0.15);
      --md-elevation-2: 0 1px 2px rgba(0,0,0,0.3), 0 2px 6px 2px rgba(0,0,0,0.15);
      --md-shape-corner: 12px;
      --md-shape-corner-lg: 16px;
      --md-shape-corner-full: 9999px;
    }

    html[data-theme="dark"] {
      --md-primary: #D0BCFF;
      --md-on-primary: #381E72;
      --md-primary-container: #4F378B;
      --md-on-primary-container: #EADDFF;
      --md-secondary: #CCC2DC;
      --md-on-secondary: #332D41;
      --md-secondary-container: #4A4458;
      --md-on-secondary-container: #E8DEF8;
      --md-surface: #1C1B1F;
      --md-on-surface: #E6E1E5;
      --md-surface-variant: #49454F;
      --md-on-surface-variant: #CAC4D0;
      --md-outline: #938F99;
      --md-surface-container: #211F26;
      --md-surface-container-high: #2B2930;
      --md-elevation-1: 0 1px 3px 1px rgba(0,0,0,0.3), 0 1px 2px rgba(0,0,0,0.5);
      --md-elevation-2: 0 2px 6px 2px rgba(0,0,0,0.3), 0 1px 2px rgba(0,0,0,0.5);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Roboto, 'Noto Sans', sans-serif;
      background: var(--md-surface);
      color: var(--md-on-surface);
      height: 100vh;
      overflow: hidden;
      transition: background 0.35s ease, color 0.35s ease;
    }

    .card,
    .top-bar,
    .settings-panel,
    .toggle-track,
    .scene-item,
    .upload-area,
    .md-input,
    .md-select,
    .md-textarea,
    .md-btn,
    .group-chip,
    .preset-chip {
      transition: background 0.35s ease, color 0.35s ease, border-color 0.35s ease;
    }

    /* Top App Bar */
    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: var(--md-surface);
      height: 64px;
      flex-shrink: 0;
    }

    .top-bar h1 {
      font-size: 22px;
      font-weight: 400;
      color: var(--md-on-surface);
    }

    .top-bar-actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    /* Icon Button */
    .icon-btn {
      width: 40px;
      height: 40px;
      border-radius: var(--md-shape-corner-full);
      border: none;
      background: transparent;
      color: var(--md-on-surface-variant);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      transition: background 0.2s;
    }

    .icon-btn:hover {
      background: var(--md-surface-variant);
    }

    /* Cards */
    .card {
      background: var(--md-surface-container);
      border-radius: var(--md-shape-corner-lg);
      padding: 20px;
      box-shadow: var(--md-elevation-1);
    }

    .card h2 {
      font-size: 14px;
      font-weight: 500;
      color: var(--md-secondary);
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* Inputs */
    .md-input {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid var(--md-outline);
      border-radius: var(--md-shape-corner);
      background: transparent;
      color: var(--md-on-surface);
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    .md-input:focus {
      border-color: var(--md-primary);
      border-width: 2px;
      padding: 9px 13px;
    }

    .input-group {
      margin-bottom: 12px;
    }

    .input-group label {
      display: block;
      font-size: 12px;
      color: var(--md-on-surface-variant);
      margin-bottom: 4px;
      padding-left: 4px;
    }

    /* Buttons */
    .md-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 8px 20px;
      border: none;
      border-radius: var(--md-shape-corner-full);
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.1px;
      cursor: pointer;
      transition: box-shadow 0.2s, background 0.2s;
    }

    .md-btn-filled {
      background: var(--md-primary);
      color: var(--md-on-primary);
    }

    .md-btn-filled:hover {
      box-shadow: var(--md-elevation-1);
    }

    .md-btn-outlined {
      background: transparent;
      color: var(--md-secondary);
      border: 1px solid var(--md-secondary);
    }

    .md-btn-outlined:hover {
      background: var(--md-secondary-container);
      color: var(--md-on-secondary-container);
    }

    .md-btn-tonal {
      background: var(--md-primary-container);
      color: var(--md-on-primary-container);
      border: none;
    }

    .md-btn-tonal:hover {
      box-shadow: var(--md-elevation-1);
    }

    .md-btn-sm {
      padding: 6px 14px;
      font-size: 12px;
    }

    /* Select */
    .md-select {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid var(--md-outline);
      border-radius: var(--md-shape-corner);
      background: var(--md-surface);
      color: var(--md-on-surface);
      font-size: 14px;
      outline: none;
      cursor: pointer;
    }

    .md-select:focus {
      border-color: var(--md-primary);
      border-width: 2px;
      padding: 9px 13px;
    }

    /* Textarea */
    .md-textarea {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid var(--md-outline);
      border-radius: var(--md-shape-corner);
      background: transparent;
      color: var(--md-on-surface);
      font-size: 14px;
      font-family: inherit;
      outline: none;
      resize: vertical;
      min-height: 60px;
      transition: border-color 0.2s;
    }

    .md-textarea:focus {
      border-color: var(--md-primary);
      border-width: 2px;
      padding: 9px 13px;
    }

    /* File Upload Area */
    .upload-area {
      border: 2px dashed var(--md-outline);
      border-radius: var(--md-shape-corner);
      padding: 20px;
      text-align: center;
      color: var(--md-on-surface-variant);
      cursor: pointer;
      font-size: 13px;
      transition: border-color 0.2s, background 0.2s;
    }

    .upload-area:hover,
    .upload-area.dragover {
      border-color: var(--md-primary);
      background: var(--md-primary-container);
    }

    .upload-area input {
      display: none;
    }

    /* Image Preview Grid */
    .image-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
      gap: 6px;
      margin-top: 8px;
    }

    .img-card {
      border-radius: 8px;
      overflow: hidden;
      position: relative;
      aspect-ratio: 1;
      background: var(--md-surface-variant);
    }

    .img-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .img-card .asset-kind {
      position: absolute;
      left: 4px;
      bottom: 4px;
      font-size: 10px;
      line-height: 1;
      padding: 3px 6px;
      border-radius: var(--md-shape-corner-full);
      background: rgba(0,0,0,0.7);
      color: #fff;
    }

    .img-card .remove-btn {
      position: absolute;
      top: 2px;
      right: 2px;
      width: 20px;
      height: 20px;
      border-radius: var(--md-shape-corner-full);
      background: var(--md-surface);
      color: var(--md-on-surface);
      border: none;
      cursor: pointer;
      font-size: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .img-card:hover .remove-btn {
      opacity: 1;
    }

    /* Actions Row */
    .actions-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    /* Color Picker Row */
    .color-picker-wrapper {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .color-picker-wrapper input[type="color"] {
      width: 40px;
      height: 40px;
      border: none;
      border-radius: var(--md-shape-corner-full);
      cursor: pointer;
      background: none;
    }

    /* Theme Colors */
    .theme-colors-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .theme-color-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .theme-color-item label {
      font-size: 11px;
      color: var(--md-on-surface-variant);
      margin: 0;
    }

    .theme-color-item input[type="color"] {
      width: 36px;
      height: 36px;
      border: 2px solid var(--md-outline);
      border-radius: var(--md-shape-corner-full);
      cursor: pointer;
      background: none;
      padding: 0;
    }

    /* Preset Theme Chips */
    .preset-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
      gap: 8px;
    }

    .preset-chip {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border: 1px solid var(--md-outline);
      border-radius: var(--md-shape-corner);
      background: transparent;
      color: var(--md-on-surface);
      cursor: pointer;
      font-size: 12px;
      transition: background 0.2s, border-color 0.2s;
    }

    .preset-chip:hover {
      background: var(--md-surface-variant);
    }

    .preset-chip.active {
      border-color: var(--md-primary);
      background: var(--md-primary-container);
      color: var(--md-on-primary-container);
    }

    .preset-dots {
      display: flex;
      gap: 3px;
      flex-shrink: 0;
    }

    .preset-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      border: 1px solid rgba(0,0,0,0.15);
    }

    /* Snackbar */
    .snackbar {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--md-on-surface);
      color: var(--md-surface);
      padding: 12px 24px;
      border-radius: var(--md-shape-corner);
      box-shadow: var(--md-elevation-2);
      font-size: 14px;
      z-index: 100;
      opacity: 0;
      transition: transform 0.3s, opacity 0.3s;
    }

    .snackbar.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    /* Settings Panel */
    .settings-panel {
      position: fixed;
      top: 0;
      right: -320px;
      width: 320px;
      height: 100vh;
      background: var(--md-surface-container);
      box-shadow: var(--md-elevation-2);
      z-index: 20;
      transition: right 0.3s;
      padding: 24px;
      overflow-y: auto;
    }

    .settings-panel.open {
      right: 0;
    }

    .settings-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.3);
      z-index: 15;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }

    .settings-overlay.open {
      opacity: 1;
      pointer-events: auto;
    }

    .settings-panel h2 {
      font-size: 22px;
      font-weight: 400;
      margin-bottom: 24px;
      text-transform: none;
      letter-spacing: normal;
    }

    .setting-item {
      margin-bottom: 20px;
    }

    .setting-item label {
      font-size: 14px;
      color: var(--md-on-surface-variant);
      display: block;
      margin-bottom: 8px;
    }

    /* Toggle Switch */
    .toggle-wrapper {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .toggle {
      position: relative;
      width: 52px;
      height: 32px;
    }

    .toggle input {
      opacity: 0;
      position: absolute;
      width: 100%;
      height: 100%;
      margin: 0;
      cursor: pointer;
      z-index: 1;
    }

    .toggle-track {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: var(--md-surface-variant);
      border: 2px solid var(--md-outline);
      border-radius: 16px;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
    }

    .toggle-thumb {
      position: absolute;
      top: 6px;
      left: 6px;
      width: 20px;
      height: 20px;
      background: var(--md-outline);
      border-radius: 50%;
      transition: transform 0.2s, background 0.2s;
    }

    .toggle input:checked + .toggle-track {
      background: var(--md-primary);
      border-color: var(--md-primary);
    }

    .toggle input:checked + .toggle-track .toggle-thumb {
      transform: translateX(20px);
      background: var(--md-on-primary);
    }

    /* ===== Three-Column Editor Layout ===== */
    .editor-layout {
      display: grid;
      grid-template-columns: 280px 1fr 320px;
      gap: 12px;
      height: calc(100vh - 64px);
      padding: 0 12px 12px;
    }

    .editor-column {
      min-height: 0;
      display: flex;
      flex-direction: column;
      gap: 12px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--md-outline) transparent;
    }

    .editor-column::-webkit-scrollbar {
      width: 4px;
    }

    .editor-column::-webkit-scrollbar-thumb {
      background: var(--md-outline);
      border-radius: 4px;
    }

    /* Left Column - Toolbar */
    .left-column .card {
      flex-shrink: 0;
    }

    /* Center Column - Preview */
    .center-column {
      overflow: hidden;
    }

    .center-column .preview-card {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .preview-container {
      position: relative;
      flex: 1;
      min-height: 300px;
      background: #000;
      border-radius: var(--md-shape-corner);
      overflow: hidden;
      user-select: none;
    }

    .preview-bg {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .preview-character {
      position: absolute;
      bottom: 20%;
      left: 50%;
      transform: translateX(-50%);
      max-height: 80%;
      max-width: 60%;
      object-fit: contain;
    }

    .preview-dialog {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(transparent, rgba(0,0,0,0.85));
      padding: 32px 24px 20px;
      color: #fff;
    }

    .preview-speaker {
      font-size: 14px;
      font-weight: 600;
      color: var(--md-primary-container);
      margin-bottom: 4px;
    }

    .preview-text {
      font-size: 16px;
      line-height: 1.5;
    }

    .preview-empty {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      color: #666;
      font-size: 14px;
    }

    /* Preview Controls */
    .preview-controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 8px 0;
    }

    .preview-controls .counter {
      font-size: 13px;
      color: var(--md-on-surface-variant);
      min-width: 50px;
      text-align: center;
    }

    /* Timeline Slider */
    .timeline-wrap {
      padding: 8px 0 4px;
    }

    .timeline-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }

    .timeline-hint {
      color: var(--md-on-surface-variant);
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .timeline-slider {
      width: 100%;
      -webkit-appearance: none;
      appearance: none;
      height: 6px;
      border-radius: var(--md-shape-corner-full);
      outline: none;
      background: linear-gradient(
        to right,
        var(--md-primary) var(--tl-progress, 0%),
        var(--md-surface-variant) var(--tl-progress, 0%)
      );
      cursor: pointer;
    }

    .timeline-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--md-primary);
      border: 2px solid var(--md-surface);
      box-shadow: var(--md-elevation-1);
    }

    .timeline-slider::-moz-range-thumb {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--md-primary);
      border: 2px solid var(--md-surface);
      box-shadow: var(--md-elevation-1);
    }

    /* Group Chips */
    .group-menu {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 8px;
    }

    .group-chip {
      border: 1px solid var(--md-outline);
      border-radius: var(--md-shape-corner-full);
      padding: 5px 12px;
      background: transparent;
      color: var(--md-on-surface-variant);
      cursor: pointer;
      font-size: 12px;
      transition: background 0.2s, color 0.2s;
    }

    .group-chip:hover {
      background: var(--md-surface-variant);
    }

    .group-chip.active {
      border-color: var(--md-primary);
      color: var(--md-on-primary);
      background: var(--md-primary);
    }

    /* Scene List */
    .scene-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-height: 400px;
      overflow-y: auto;
    }

    .scene-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      background: var(--md-surface-variant);
      border-radius: var(--md-shape-corner);
      cursor: pointer;
      transition: background 0.2s, outline 0.2s;
      outline: 2px solid transparent;
    }

    .scene-item:hover {
      background: var(--md-surface-container-high);
    }

    .scene-item.active {
      outline: 2px solid var(--md-primary);
    }

    .scene-item-num {
      font-size: 11px;
      font-weight: 500;
      color: var(--md-on-primary);
      background: var(--md-primary);
      width: 24px;
      height: 24px;
      border-radius: var(--md-shape-corner-full);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .scene-item-info {
      flex: 1;
      min-width: 0;
    }

    .scene-item-title {
      font-size: 13px;
      font-weight: 500;
      color: var(--md-on-surface);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .scene-item-sub {
      font-size: 11px;
      color: var(--md-on-surface-variant);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .scene-item .remove-scene-btn {
      width: 28px;
      height: 28px;
      border-radius: var(--md-shape-corner-full);
      border: none;
      background: transparent;
      color: var(--md-on-surface-variant);
      cursor: pointer;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .scene-item:hover .remove-scene-btn {
      opacity: 1;
    }

    /* Right Column - Properties */
    .panel-empty {
      color: var(--md-on-surface-variant);
      font-size: 13px;
      padding: 8px 0;
    }

    .list-empty {
      font-size: 13px;
      color: var(--md-on-surface-variant);
      padding: 8px 0;
    }

    .divider {
      height: 1px;
      background: var(--md-surface-variant);
      margin: 12px 0;
    }

    /* Responsive */
    @media (max-width: 1100px) {
      .editor-layout {
        grid-template-columns: 240px 1fr 280px;
      }
    }

    @media (max-width: 900px) {
      body {
        overflow: auto;
        height: auto;
      }

      .editor-layout {
        grid-template-columns: 1fr 1fr;
        grid-template-areas:
          "center center"
          "left right";
        height: auto;
      }

      .left-column { grid-area: left; }
      .center-column { grid-area: center; }
      .right-column { grid-area: right; }

      .editor-column {
        overflow: visible;
      }

      .preview-container {
        min-height: 280px;
      }
    }

    @media (max-width: 600px) {
      .editor-layout {
        grid-template-columns: 1fr;
        grid-template-areas:
          "center"
          "left"
          "right";
        padding: 0 8px 8px;
        gap: 8px;
      }
    }
  </style>
</head>
<body>

  <!-- Top App Bar -->
  <header class="top-bar">
    <h1>GalBundler</h1>
    <div class="top-bar-actions">
      <button class="icon-btn" id="settingsBtn" title="Settings">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
          <path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.07-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.74,8.87 C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.07,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.44-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.47-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/>

          <input type="color" id="secondaryColor" value="#625B71" title="Secondary">
          <label>Secondary</label>
        </div>
        <div class="theme-color-item">

          <label>Background</label>

      </div>

  <!-- Snackbar -->
  <div class="snackbar" id="snackbar"></div>

  <script>
    // ===== Helpers =====
    function clamp(v, lo, hi) {
      const n = Number(v);
      if (!Number.isFinite(n)) return lo;
      return Math.max(lo, Math.min(hi, n));
    }
    function normalizeGroup(name) { return String(name || '').trim() || 'default'; }
    function escHtml(s) {
      return String(s).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
    }
    function isValidBase64(s) {
      return typeof s === 'string' && s.length > 0 && /^[A-Za-z0-9+/]+={0,2}$/.test(s.replace(/\s+/g, ''));
    }

    // ===== Theme =====
    const darkToggle = document.getElementById('darkToggle');
    const themeColorInput = document.getElementById('themeColor');
    const secondaryColorInput = document.getElementById('secondaryColor');
    const bgColorInput = document.getElementById('bgColor');
    const $presetGrid = document.getElementById('presetGrid');

    // ===== Theme Presets =====
    const PRESETS = [
      { name: 'Lavender',   primary: '#6750A4', secondary: '#625B71', bg: '#FFFBFE', bgDark: '#1C1B1F' },
      { name: 'Ocean',      primary: '#0061A4', secondary: '#535F70', bg: '#FDFCFF', bgDark: '#1A1C1E' },
      { name: 'Forest',     primary: '#386A20', secondary: '#55624C', bg: '#FDFDF5', bgDark: '#1A1C18' },
      { name: 'Sakura',     primary: '#984061', secondary: '#74565F', bg: '#FFFBFF', bgDark: '#201A1D' },
      { name: 'Sunset',     primary: '#C00011', secondary: '#775652', bg: '#FFFBFF', bgDark: '#201A19' },
      { name: 'Amber',      primary: '#7D5700', secondary: '#6B5D3F', bg: '#FFFBFF', bgDark: '#1F1B13' },
      { name: 'Teal',       primary: '#006A6A', secondary: '#4A6363', bg: '#FAFDFC', bgDark: '#191C1C' },
      { name: 'Slate',      primary: '#5B6070', secondary: '#5E5E67', bg: '#FDFBFF', bgDark: '#1B1B1F' },
    ];

    function applyDarkMode(isDark) {
      document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
      localStorage.setItem('darkMode', isDark);
    }

    function hexToHSL(hex) {
      let r = parseInt(hex.slice(1,3),16)/255;
      let g = parseInt(hex.slice(3,5),16)/255;
      let b = parseInt(hex.slice(5,7),16)/255;
      const max = Math.max(r,g,b), min = Math.min(r,g,b);
      let h, s, l = (max+min)/2;
      if (max === min) { h = s = 0; }
      else {
        const d = max - min;
        s = l > 0.5 ? d/(2-max-min) : d/(max+min);
        switch(max) {
          case r: h = ((g-b)/d + (g<b?6:0))/6; break;
          case g: h = ((b-r)/d + 2)/6; break;
          case b: h = ((r-g)/d + 4)/6; break;
        }
      }
      return { h: Math.round(h*360), s: Math.round(s*100), l: Math.round(l*100) };
    }

    function hslToHex(h, s, l) {
      const hue = ((Number(h) % 360) + 360) % 360;
      const sat = clamp(s, 0, 100) / 100;
      const lig = clamp(l, 0, 100) / 100;
      const a = sat * Math.min(lig, 1 - lig);
      const f = n => {
        const k = (n + hue / 30) % 12;
        const color = lig - a * Math.max(Math.min(k - 3, 9 - k, 1), -1);
        return Math.round(255 * clamp(color, 0, 1)).toString(16).padStart(2, '0');
      };
      return `#${f(0)}${f(8)}${f(4)}`;
    }

    function safeHex(hex, fallback) {
      return /^#[0-9a-fA-F]{6}$/.test(hex) ? hex : fallback;
    }

    function applyColors() {
      const root = document.documentElement;
      const isDark = root.getAttribute('data-theme') === 'dark';

      // Primary
      const pHex = safeHex(themeColorInput.value, '#6750A4');
      const pHsl = hexToHSL(pHex);

      // In dark mode: primary tone ~80, container ~30, onContainer ~90
      // In light mode: primary tone ~40, container ~90, onContainer ~10
      const primaryDisplay = isDark
        ? hslToHex(pHsl.h, Math.min(pHsl.s, 80), 80)
        : pHex;
      const primaryOnPrimary = isDark
        ? hslToHex(pHsl.h, Math.min(pHsl.s, 80), 20)
        : (pHsl.l > 50 ? '#1C1B1F' : '#FFFFFF');
      const containerL = isDark ? 30 : 90;
      const onContainerL = isDark ? 90 : 10;

      root.style.setProperty('--md-primary', primaryDisplay);
      root.style.setProperty('--md-on-primary', primaryOnPrimary);
      root.style.setProperty('--md-primary-container', `hsl(${pHsl.h}, ${Math.min(pHsl.s,80)}%, ${containerL}%)`);
      root.style.setProperty('--md-on-primary-container', `hsl(${pHsl.h}, ${Math.min(pHsl.s,80)}%, ${onContainerL}%)`);
      localStorage.setItem('themeColor', pHex);

      // Secondary
      const sHex = safeHex(secondaryColorInput.value, '#625B71');
      const sHsl = hexToHSL(sHex);

      const secondaryDisplay = isDark
        ? hslToHex(sHsl.h, Math.min(sHsl.s, 60), 80)
        : sHex;
      const secondaryOnSecondary = isDark
        ? hslToHex(sHsl.h, Math.min(sHsl.s, 60), 20)
        : (sHsl.l > 50 ? '#1C1B1F' : '#FFFFFF');
      const sContainerL = isDark ? 30 : 90;
      const sOnContainerL = isDark ? 90 : 10;

      root.style.setProperty('--md-secondary', secondaryDisplay);
      root.style.setProperty('--md-on-secondary', secondaryOnSecondary);
      root.style.setProperty('--md-secondary-container', `hsl(${sHsl.h}, ${Math.min(sHsl.s,60)}%, ${sContainerL}%)`);
      root.style.setProperty('--md-on-secondary-container', `hsl(${sHsl.h}, ${Math.min(sHsl.s,60)}%, ${sOnContainerL}%)`);
      localStorage.setItem('secondaryColor', sHex);

      // Background / Surface
      const bgHex = safeHex(bgColorInput.value, isDark ? '#1C1B1F' : '#FFFBFE');
      const bgHsl = hexToHSL(bgHex);

      // Generate a surface tonal family from the chosen background color
      const surfaceBase = isDark
        ? hslToHex(bgHsl.h, Math.min(bgHsl.s, 15), 10)
        : bgHex;
      const onSurface = isDark
        ? hslToHex(bgHsl.h, Math.min(bgHsl.s, 10), 90)
        : hslToHex(bgHsl.h, Math.min(bgHsl.s, 10), 10);
      const surfaceVariant = isDark
        ? hslToHex(bgHsl.h, Math.min(bgHsl.s, 15), 20)
        : hslToHex(bgHsl.h, Math.min(bgHsl.s, 15), 90);
      const onSurfaceVariant = isDark
        ? hslToHex(bgHsl.h, Math.min(bgHsl.s, 12), 80)
        : hslToHex(bgHsl.h, Math.min(bgHsl.s, 12), 30);
      const surfaceContainer = isDark
        ? hslToHex(bgHsl.h, Math.min(bgHsl.s, 15), 14)
        : hslToHex(bgHsl.h, Math.min(bgHsl.s, 15), 94);
      const surfaceContainerHigh = isDark
        ? hslToHex(bgHsl.h, Math.min(bgHsl.s, 15), 18)
        : hslToHex(bgHsl.h, Math.min(bgHsl.s, 15), 92);
      const outline = isDark
        ? hslToHex(bgHsl.h, Math.min(bgHsl.s, 10), 55)
        : hslToHex(bgHsl.h, Math.min(bgHsl.s, 10), 50);

      root.style.setProperty('--md-surface', surfaceBase);
      root.style.setProperty('--md-on-surface', onSurface);
      root.style.setProperty('--md-surface-variant', surfaceVariant);
      root.style.setProperty('--md-on-surface-variant', onSurfaceVariant);
      root.style.setProperty('--md-surface-container', surfaceContainer);
      root.style.setProperty('--md-surface-container-high', surfaceContainerHigh);
      root.style.setProperty('--md-outline', outline);
      localStorage.setItem('bgColor', bgHex);

      // Highlight active preset
      renderPresets();
    }

    // ===== Preset Rendering =====
    function renderPresets() {
      const curP = themeColorInput.value.toUpperCase();
      const curS = secondaryColorInput.value.toUpperCase();
      $presetGrid.innerHTML = PRESETS.map((p, i) => {
        const active = curP === p.primary.toUpperCase() && curS === p.secondary.toUpperCase() ? ' active' : '';
        return `<button class="preset-chip${active}" data-preset="${i}">
          <span class="preset-dots">
            <span class="preset-dot" style="background:${p.primary}"></span>
            <span class="preset-dot" style="background:${p.secondary}"></span>
            <span class="preset-dot" style="background:${p.bg}"></span>
          </span>
          ${escHtml(p.name)}
        </button>`;
      }).join('');
    }

    function applyPreset(index) {
      const p = PRESETS[index];
      if (!p) return;
      const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
      themeColorInput.value = p.primary;
      secondaryColorInput.value = p.secondary;
      bgColorInput.value = isDark ? p.bgDark : p.bg;
      localStorage.setItem('bgColor', bgColorInput.value);
      applyColors();
    }

    $presetGrid.addEventListener('click', e => {
      const chip = e.target.closest('[data-preset]');
      if (chip) applyPreset(Number(chip.dataset.preset));
    });

    // Load saved preferences
    const savedDark = localStorage.getItem('darkMode') === 'true';
    darkToggle.checked = savedDark;
    applyDarkMode(savedDark);

    const savedPrimary = localStorage.getItem('themeColor');
    if (savedPrimary) themeColorInput.value = savedPrimary;
    const savedSecondary = localStorage.getItem('secondaryColor');
    if (savedSecondary) secondaryColorInput.value = savedSecondary;
    const savedBg = localStorage.getItem('bgColor');
    if (savedBg) bgColorInput.value = savedBg;
    applyColors();

    darkToggle.addEventListener('change', () => {
      applyDarkMode(darkToggle.checked);
      // Auto-switch bg color for dark/light mode
      const curP = themeColorInput.value.toUpperCase();
      const curS = secondaryColorInput.value.toUpperCase();
      const matched = PRESETS.find(p => p.primary.toUpperCase() === curP && p.secondary.toUpperCase() === curS);
      if (matched) {
        bgColorInput.value = darkToggle.checked ? matched.bgDark : matched.bg;
      } else {
        bgColorInput.value = darkToggle.checked ? '#1C1B1F' : '#FFFBFE';
      }
      applyColors();
    });
    themeColorInput.addEventListener('input', applyColors);
    secondaryColorInput.addEventListener('input', applyColors);
    bgColorInput.addEventListener('input', applyColors);

    // ===== Settings Panel =====
    const settingsBtn = document.getElementById('settingsBtn');
    const settingsPanel = document.getElementById('settingsPanel');
    const settingsOverlay = document.getElementById('settingsOverlay');
    function toggleSettings() {
      settingsPanel.classList.toggle('open');
      settingsOverlay.classList.toggle('open');
    }
    settingsBtn.addEventListener('click', toggleSettings);
    settingsOverlay.addEventListener('click', toggleSettings);

    // ===== Snackbar =====
    function showSnackbar(msg) {
      const el = document.getElementById('snackbar');
      el.textContent = msg;
      el.classList.add('show');
      setTimeout(() => el.classList.remove('show'), 3000);
    }

    // ===== Application State =====
    const state = {
      images: [],           // { name, data (base64), kind }
      scenes: [],           // { group, bg, character, speaker, text }
      groups: ['default'],
      activeGroup: 'default',
      editIndex: -1,
      previewIndex: 0,
    };

    // ===== DOM References =====
    const $uploadArea = document.getElementById('uploadArea');
    const $imageInput = document.getElementById('imageInput');
    const $imageGrid = document.getElementById('imageGrid');
    const $assetType = document.getElementById('assetType');

    const $groupMenu = document.getElementById('groupMenu');
    const $sceneList = document.getElementById('sceneList');

    const $editorForm = document.getElementById('sceneEditorForm');
    const $editorEmpty = document.getElementById('sceneEditorEmpty');
    const $editorTitle = document.getElementById('sceneEditorTitle');
    const $sceneGroup = document.getElementById('sceneGroupSelect');
    const $sceneBg = document.getElementById('sceneBg');
    const $sceneChar = document.getElementById('sceneChar');
    const $sceneSpeaker = document.getElementById('sceneSpeaker');
    const $sceneText = document.getElementById('sceneText');

    const $previewBox = document.getElementById('previewContainer');
    const $previewEmpty = document.getElementById('previewEmpty');
    const $previewCtrls = document.getElementById('previewControls');
    const $previewCount = document.getElementById('previewCounter');
    const $timelineWrap = document.getElementById('timelineWrap');
    const $timelineHint = document.getElementById('timelineHint');
    const $timeline = document.getElementById('sceneTimeline');

    // ===== Show/Hide Editor =====
    function showEditor(visible) {
      $editorForm.style.display = visible ? '' : 'none';
      $editorEmpty.style.display = visible ? 'none' : '';
    }

    // ===== Render: Image Grid =====
    function renderImages() {
      $imageGrid.textContent = '';
      const frag = document.createDocumentFragment();
      state.images.forEach((img, i) => {
        const card = document.createElement('div');
        card.className = 'img-card';

        const imgEl = document.createElement('img');
        imgEl.alt = img.name;
        imgEl.src = 'data:image/png;base64,' + img.data;
        card.appendChild(imgEl);

        const kind = document.createElement('span');
        kind.className = 'asset-kind';
        kind.textContent = img.kind;
        card.appendChild(kind);

        const btn = document.createElement('button');
        btn.className = 'remove-btn';
        btn.dataset.rmImg = String(i);
        btn.title = 'Remove';
        btn.textContent = '\u00D7';
        card.appendChild(btn);

        frag.appendChild(card);
      });
      $imageGrid.appendChild(frag);
    }

    // ===== Render: Image Select Options =====
    function buildImgOptions(selected, preferKinds) {
      const preferred = state.images.filter(img => preferKinds.includes(img.kind));
      const rest = state.images.filter(img => !preferKinds.includes(img.kind));
      const ordered = preferred.concat(rest);
      let html = '<option value="">(none)</option>';
      for (const img of ordered) {
        const sel = img.name === selected ? ' selected' : '';
        html += `<option value="${escHtml(img.name)}"${sel}>${escHtml(img.name)} [${escHtml(img.kind)}]</option>`;
      }
      return html;
    }

    function refreshSelects() {
      $sceneBg.innerHTML = buildImgOptions($sceneBg.value, ['background','effect']);
      $sceneChar.innerHTML = buildImgOptions($sceneChar.value, ['character','effect']);
    }

    // ===== Render: Group Chips =====
    function renderGroups() {
      $groupMenu.innerHTML = state.groups.map(g => {
        const count = state.scenes.filter(s => normalizeGroup(s.group) === g).length;
        const active = g === state.activeGroup ? ' active' : '';
        return `<button class="group-chip${active}" data-group="${escHtml(g)}">${escHtml(g)} (${count})</button>`;
      }).join('');
    }

    // ===== Render: Group Select in Editor =====
    function renderGroupSelect(selected) {
      $sceneGroup.innerHTML = state.groups
        .map(g => `<option value="${escHtml(g)}">${escHtml(g)}</option>`)
        .join('');
      $sceneGroup.value = state.groups.includes(selected) ? selected : 'default';
    }

    // ===== Render: Scene List =====
    function renderSceneList() {
      const items = state.scenes
        .map((scene, index) => ({ scene, index }))
        .filter(({ scene }) => normalizeGroup(scene.group) === state.activeGroup);

      if (items.length === 0) {
        $sceneList.innerHTML = '<div class="list-empty">No scenes in this group</div>';
        return;
      }

      $sceneList.innerHTML = items.map(({ scene, index }) => {
        const active = index === state.editIndex ? ' active' : '';
        return `<div class="scene-item${active}" data-scene="${index}">
          <span class="scene-item-num">${index + 1}</span>
          <div class="scene-item-info">
            <div class="scene-item-title">${escHtml(scene.speaker || '(narrator)')}</div>
            <div class="scene-item-sub">${escHtml(scene.text || '(empty)')}</div>
          </div>
          <button class="remove-scene-btn" data-rm-scene="${index}" title="Remove">&#215;</button>
        </div>`;
      }).join('');
    }

    // ===== Render: Preview =====
    function getImgUrl(name) {
      const img = state.images.find(i => i.name === name);
      if (!img || !img.data) return null;
      return 'data:image/png;base64,' + img.data;
    }

    function syncTimeline() {
      const max = Math.max(0, state.scenes.length - 1);
      state.previewIndex = clamp(state.previewIndex, 0, max);
      $timeline.max = String(max);
      $timeline.value = String(state.previewIndex);
      const pct = max === 0 ? 0 : (state.previewIndex / max) * 100;
      $timeline.style.setProperty('--tl-progress', pct + '%');
      $timelineWrap.style.display = state.scenes.length > 0 ? '' : 'none';
    }

    function renderPreview(overrideScene) {
      // Clean previous
      $previewBox.querySelectorAll('.preview-bg,.preview-character,.preview-dialog').forEach(el => el.remove());

      if (state.scenes.length === 0) {
        $previewEmpty.style.display = '';
        $previewCtrls.style.display = 'none';
        $previewCount.textContent = '0 / 0';
        $timelineHint.textContent = 'Drag to browse scenes';
        syncTimeline();
        return;
      }

      $previewEmpty.style.display = 'none';
      $previewCtrls.style.display = '';
      syncTimeline();

      const scene = overrideScene || state.scenes[state.previewIndex];
      $previewCount.textContent = `${state.previewIndex + 1} / ${state.scenes.length}`;
      $timelineHint.textContent = `${normalizeGroup(scene.group)} \u00B7 ${scene.speaker || 'Narrator'}`;

      if (scene.bg) {
        const url = getImgUrl(scene.bg);
        if (url) {
          const img = document.createElement('img');
          img.className = 'preview-bg';
          img.src = url;
          $previewBox.appendChild(img);
        }
      }

      if (scene.character) {
        const url = getImgUrl(scene.character);
        if (url) {
          const img = document.createElement('img');
          img.className = 'preview-character';
          img.src = url;
          $previewBox.appendChild(img);
        }
      }

      if (scene.speaker || scene.text) {
        const dialog = document.createElement('div');
        dialog.className = 'preview-dialog';
        if (scene.speaker) {
          const sp = document.createElement('div');
          sp.className = 'preview-speaker';
          sp.textContent = scene.speaker;
          dialog.appendChild(sp);
        }
        if (scene.text) {
          const tx = document.createElement('div');
          tx.className = 'preview-text';
          tx.textContent = scene.text;
          dialog.appendChild(tx);
        }
        $previewBox.appendChild(dialog);
      }
    }

    // ===== Get Form Values =====
    function getFormScene() {
      return {
        group: normalizeGroup($sceneGroup.value),
        bg: $sceneBg.value,
        character: $sceneChar.value,
        speaker: $sceneSpeaker.value,
        text: $sceneText.value,
      };
    }

    // ===== Select Scene =====
    function selectScene(index) {
      if (index < 0 || index >= state.scenes.length) return;
      state.editIndex = index;
      state.previewIndex = index;
      state.activeGroup = normalizeGroup(state.scenes[index].group);

      const scene = state.scenes[index];
      $editorTitle.textContent = `Scene ${index + 1}`;
      renderGroupSelect(state.activeGroup);
      refreshSelects();
      $sceneGroup.value = normalizeGroup(scene.group);
      $sceneBg.value = scene.bg || '';
      $sceneChar.value = scene.character || '';
      $sceneSpeaker.value = scene.speaker || '';
      $sceneText.value = scene.text || '';

      showEditor(true);
      renderGroups();
      renderSceneList();
      renderPreview();
    }

    // ===== Remove Scene =====
    function removeScene(index) {
      if (index < 0 || index >= state.scenes.length) return;
      state.scenes.splice(index, 1);
      if (state.editIndex === index) {
        state.editIndex = -1;
        showEditor(false);
      } else if (state.editIndex > index) {
        state.editIndex--;
      }
      state.previewIndex = clamp(state.previewIndex, 0, Math.max(0, state.scenes.length - 1));
      renderGroups();
      renderSceneList();
      renderPreview();
    }

    // ===== Live Preview on Edit =====
    let previewDebounce = null;
    function livePreview() {
      if (state.editIndex < 0 || state.previewIndex !== state.editIndex) return;
      clearTimeout(previewDebounce);
      previewDebounce = setTimeout(() => renderPreview(getFormScene()), 80);
    }

    // ===== Event: Upload =====
    $uploadArea.addEventListener('click', () => $imageInput.click());
    $uploadArea.addEventListener('dragover', e => { e.preventDefault(); $uploadArea.classList.add('dragover'); });
    $uploadArea.addEventListener('dragleave', () => $uploadArea.classList.remove('dragover'));
    $uploadArea.addEventListener('drop', e => {
      e.preventDefault();
      $uploadArea.classList.remove('dragover');
      handleFiles(e.dataTransfer.files);
    });
    $imageInput.addEventListener('change', e => handleFiles(e.target.files));

    function handleFiles(files) {
      const kind = $assetType.value || 'effect';
      for (const file of files) {
        if (!file.type.startsWith('image/')) continue;
        const reader = new FileReader();
        reader.onload = e => {
          const base64 = e.target.result.split(',')[1];
          const existing = state.images.findIndex(img => img.name === file.name);
          if (existing >= 0) state.images.splice(existing, 1);
          state.images.push({ name: file.name, data: base64, kind });
          renderImages();
          refreshSelects();
          renderPreview();
        };
        reader.readAsDataURL(file);
      }
    }

    $imageGrid.addEventListener('click', e => {
      const btn = e.target.closest('[data-rm-img]');
      if (!btn) return;
      const idx = Number(btn.dataset.rmImg);
      const removed = state.images[idx];
      state.images.splice(idx, 1);
      if (removed) {
        for (const s of state.scenes) {
          if (s.bg === removed.name) s.bg = '';
          if (s.character === removed.name) s.character = '';
        }
      }
      renderImages();
      refreshSelects();
      renderPreview();
    });

    // ===== Event: Groups =====
    document.getElementById('addGroupBtn').addEventListener('click', () => {
      const raw = prompt('Enter group name');
      if (raw === null) return;
      const name = normalizeGroup(raw);
      if (state.groups.includes(name)) { showSnackbar('Group already exists'); return; }
      state.groups.push(name);
      state.activeGroup = name;
      renderGroups();
      renderSceneList();
      renderGroupSelect(name);
    });

    $groupMenu.addEventListener('click', e => {
      const chip = e.target.closest('[data-group]');
      if (!chip) return;
      state.activeGroup = normalizeGroup(chip.dataset.group);
      const first = state.scenes.findIndex(s => normalizeGroup(s.group) === state.activeGroup);
      if (first >= 0) {
        selectScene(first);
        return;
      }
      state.editIndex = -1;
      showEditor(false);
      renderGroups();
      renderSceneList();
      renderPreview();
    });

    // ===== Event: Add Scene =====
    document.getElementById('addSceneBtn').addEventListener('click', () => {
      state.scenes.push({ group: state.activeGroup, bg: '', character: '', speaker: '', text: '' });
      selectScene(state.scenes.length - 1);
      showSnackbar('Scene added');
    });

    // ===== Event: Scene List Clicks (delegation) =====
    $sceneList.addEventListener('click', e => {
      const rmBtn = e.target.closest('[data-rm-scene]');
      if (rmBtn) { removeScene(Number(rmBtn.dataset.rmScene)); return; }
      const item = e.target.closest('[data-scene]');
      if (item) selectScene(Number(item.dataset.scene));
    });

    // ===== Event: Scene Editor =====
    document.getElementById('saveSceneBtn').addEventListener('click', () => {
      if (state.editIndex < 0) return;
      const scene = getFormScene();
      state.scenes[state.editIndex] = scene;
      if (!state.groups.includes(scene.group)) state.groups.push(scene.group);
      state.activeGroup = scene.group;
      selectScene(state.editIndex);
      showSnackbar('Scene saved');
    });

    document.getElementById('cancelSceneBtn').addEventListener('click', () => {
      state.editIndex = -1;
      showEditor(false);
      renderSceneList();
    });

    document.getElementById('deleteSceneBtn').addEventListener('click', () => {
      if (state.editIndex < 0) return;
      removeScene(state.editIndex);
      showSnackbar('Scene deleted');
    });

    [$sceneBg, $sceneChar, $sceneGroup].forEach(el => el.addEventListener('change', livePreview));
    [$sceneSpeaker, $sceneText].forEach(el => el.addEventListener('input', livePreview));

    // ===== Event: Timeline =====
    $timeline.addEventListener('input', () => {
      if (!state.scenes.length) return;
      selectScene(clamp(Number($timeline.value), 0, state.scenes.length - 1));
    });

    // ===== Event: Prev/Next =====
    document.getElementById('prevSceneBtn').addEventListener('click', () => {
      if (!state.scenes.length) return;
      selectScene((state.previewIndex - 1 + state.scenes.length) % state.scenes.length);
    });

    document.getElementById('nextSceneBtn').addEventListener('click', () => {
      if (!state.scenes.length) return;
      selectScene((state.previewIndex + 1) % state.scenes.length);
    });

    document.addEventListener('keydown', e => {
      if (['INPUT','TEXTAREA','SELECT'].includes(e.target.tagName)) return;
      if (e.key === 'ArrowLeft') document.getElementById('prevSceneBtn').click();
      if (e.key === 'ArrowRight') document.getElementById('nextSceneBtn').click();
    });

    // ===== API: Generate =====
    document.getElementById('generateBtn').addEventListener('click', async () => {
      const title = document.getElementById('gameTitle').value || 'GalGame';
      const group = document.getElementById('imageGroup').value || 'default';
      const images = state.images.map(img => ({ name: img.name, data: img.data, group }));

      try {
        const res = await fetch('/api/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ title, images, scenes: state.scenes }),
        });
        const result = await res.json();
        showSnackbar(result.success ? 'ZIP generated: ' + result.path : 'Error: ' + result.error);
      } catch (err) {
        showSnackbar('Error: ' + err.message);
      }
    });

    // ===== API: Draft Save/Load =====
    document.getElementById('saveDraftBtn').addEventListener('click', async () => {
      const payload = {
        title: document.getElementById('gameTitle').value,
        imageGroup: document.getElementById('imageGroup').value,
        images: state.images,
        scenes: state.scenes,
        groups: state.groups,
        activeGroup: state.activeGroup,
        previewIndex: state.previewIndex,
        savedAt: new Date().toISOString(),
      };
      try {
        const res = await fetch('/api/progress', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });
        const result = await res.json();
        showSnackbar(result.success ? 'Draft saved' : 'Error: ' + result.error);
      } catch (err) {
        showSnackbar('Error: ' + err.message);
      }
    });

    document.getElementById('loadDraftBtn').addEventListener('click', async () => {
      try {
        const res = await fetch('/api/progress');
        const result = await res.json();
        if (!result.success || !result.data) { showSnackbar('No draft found'); return; }
        const d = result.data;

        document.getElementById('gameTitle').value = d.title || '';
        document.getElementById('imageGroup').value = d.imageGroup || '';
        const rawImages = Array.isArray(d.images) ? d.images : (Array.isArray(d.uploadedImages) ? d.uploadedImages : []);
        state.images = rawImages.filter(img => img && img.name && img.data);
        state.scenes = Array.isArray(d.scenes) ? d.scenes.map(s => ({
          group: normalizeGroup(s.group),
          bg: s.bg || '', character: s.character || '',
          speaker: s.speaker || '', text: s.text || '',
        })) : [];
        const rawGroups = Array.isArray(d.groups) ? d.groups : (Array.isArray(d.sceneGroups) ? d.sceneGroups : ['default']);
        const groups = rawGroups.map(normalizeGroup);
        state.groups = [...new Set(['default', ...groups])];
        for (const s of state.scenes) {
          if (!state.groups.includes(s.group)) state.groups.push(s.group);
        }
        state.activeGroup = state.groups.includes(d.activeGroup) ? d.activeGroup : 'default';
        state.previewIndex = clamp(Number(d.previewIndex || 0), 0, Math.max(0, state.scenes.length - 1));
        state.editIndex = -1;
        showEditor(false);

        renderImages();
        renderGroups();
        renderSceneList();
        renderGroupSelect(state.activeGroup);
        refreshSelects();
        renderPreview();
        showSnackbar('Draft loaded');
      } catch (err) {
        showSnackbar('Error: ' + err.message);
      }
    });

    // ===== API: Runtime ZIP Progress =====
    document.getElementById('loadProgressBtn').addEventListener('click', async () => {
      const zipPath = document.getElementById('runtimePath').value;
      if (!zipPath) { showSnackbar('Please enter a ZIP path'); return; }
      try {
        const res = await fetch('/api/runtime/load', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ zipPath }),
        });
        const result = await res.json();
        showSnackbar(result.success ? (result.data ? 'Runtime progress loaded' : 'No progress found') : 'Error: ' + result.error);
      } catch (err) {
        showSnackbar('Error: ' + err.message);
      }
    });

    document.getElementById('saveProgressBtn').addEventListener('click', async () => {
      const zipPath = document.getElementById('runtimePath').value;
      if (!zipPath) { showSnackbar('Please enter a ZIP path'); return; }
      try {
        const res = await fetch('/api/runtime/save', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            zipPath,
            progressData: {
              savedAt: new Date().toISOString(),
              previewIndex: state.previewIndex,
              sceneCount: state.scenes.length,
            },
          }),
        });
        const result = await res.json();
        showSnackbar(result.success ? 'Progress saved to ZIP' : 'Error: ' + result.error);
      } catch (err) {
        showSnackbar('Error: ' + err.message);
      }
    });

    // ===== Init =====
    showEditor(false);
    renderGroups();
    renderSceneList();
    renderGroupSelect('default');
    refreshSelects();
    renderImages();
    renderPreview();
  </script>
</body>
</html>
